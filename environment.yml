# Conda environment for the DRW crypto-prediction notebook.
#
#   conda env create -f environment.yml
#   conda activate drw-crypto
#   python -m ipykernel install --user --name drw-crypto   # register Jupyter kernel
#
# Versions pinned to a known-working setup; loosen (e.g. numpy>=2.2) if the
# solver struggles on your platform.

name: drw-crypto

channels:
  - conda-forge

dependencies:
  - python=3.12

  # --- core scientific stack ---
  - numpy=2.3.5
  - pandas=2.3.3
  - scipy=1.16.3
  - pyarrow=21.0.0          # required by pandas.read_parquet for the .parquet data

  # --- modeling ---
  - scikit-learn=1.7.2
  - xgboost=3.2.0
  - shap=0.52.0

  # --- plotting ---
  - matplotlib=3.10.6
  - seaborn=0.13.2

  # --- notebook ---
  - jupyterlab
  - notebook=7.4.5
  - ipykernel=6.31.0

  - pip
